<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #0f1115; --panel: #171a21; --line: #262b36;
      --text: #e6e9ef; --muted: #8a93a6; --accent: #4f7cff; --ok: #3ecf8e; --err: #ff5c5c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px; background: var(--bg); color: var(--text);
      font: 13px/1.4 -apple-system, "Segoe UI", system-ui, sans-serif; padding: 14px;
    }
    h1 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .sub { color: var(--muted); font-size: 11px; margin-bottom: 12px; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
           background: var(--muted); margin-right: 5px; vertical-align: middle; }
    .dot.ok { background: var(--ok); } .dot.err { background: var(--err); }
    fieldset { border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; margin-bottom: 10px; }
    legend { color: var(--muted); font-size: 11px; padding: 0 5px; text-transform: uppercase; letter-spacing: .04em; }
    .row { display: flex; align-items: center; justify-content: space-between; margin: 7px 0; }
    .row label { color: var(--text); }
    select { background: var(--panel); color: var(--text); border: 1px solid var(--line);
             border-radius: 7px; padding: 4px 8px; font-size: 12px; }
    .seg { display: flex; gap: 6px; }
    .seg button { flex: 1; background: var(--panel); color: var(--muted); border: 1px solid var(--line);
                  border-radius: 7px; padding: 6px; font-size: 12px; cursor: pointer; }
    .seg button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .chips { display: flex; gap: 6px; }
    .chips label { flex: 1; text-align: center; background: var(--panel); border: 1px solid var(--line);
                   border-radius: 7px; padding: 5px 0; cursor: pointer; color: var(--muted); font-size: 12px; }
    .chips input { display: none; }
    .chips input:checked + span { color: #fff; }
    .chips label:has(input:checked) { background: var(--accent); border-color: var(--accent); }
    .toggle { cursor: pointer; }
    #scrape { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 9px;
              padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 2px; }
    #scrape:disabled { opacity: .5; cursor: not-allowed; }
    #status { margin-top: 10px; font-size: 12px; color: var(--muted); min-height: 16px; }
    #bar { height: 4px; background: var(--line); border-radius: 3px; overflow: hidden; margin-top: 8px; display: none; }
    #bar > i { display: block; height: 100%; width: 0; background: var(--accent); transition: width .3s; }
    #log { margin-top: 8px; max-height: 120px; overflow-y: auto; font-family: ui-monospace, monospace;
           font-size: 11px; color: var(--muted); white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Skool Classroom Intake</h1>
  <div class="sub"><span id="srvdot" class="dot"></span><span id="srvtxt">checking server…</span></div>

  <fieldset>
    <legend>Run mode</legend>
    <div class="seg" id="mode">
      <button data-val="full" class="active">Full intake</button>
      <button data-val="download">Download only</button>
    </div>
  </fieldset>

  <fieldset>
    <legend>Options</legend>
    <div class="row">
      <label>Video quality</label>
      <select id="quality">
        <option value="480">480p</option>
        <option value="720" selected>720p</option>
        <option value="1080">1080p</option>
      </select>
    </div>
    <div class="row">
      <label>Whisper model</label>
      <select id="model">
        <option value="base.en">base.en (fastest)</option>
        <option value="small.en" selected>small.en</option>
        <option value="medium.en">medium.en (best)</option>
      </select>
    </div>
    <div class="row">
      <label>Screenshots</label>
      <input type="checkbox" id="screenshots" class="toggle" checked>
    </div>
  </fieldset>

  <fieldset id="fmtset">
    <legend>Transcript formats</legend>
    <div class="chips">
      <label><input type="checkbox" value="txt" checked><span>txt</span></label>
      <label><input type="checkbox" value="srt" checked><span>srt</span></label>
      <label><input type="checkbox" value="json" checked><span>json</span></label>
    </div>
  </fieldset>

  <button id="scrape" disabled>Scrape this classroom</button>
  <div id="bar"><i></i></div>
  <div id="status"></div>
  <div id="log"></div>

  <script src="popup.js"></script>
</body>
</html>
