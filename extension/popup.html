<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #f4ebd9;        /* cream base           */
      --panel: #fbf6ea;     /* cards                */
      --input: #efe6d4;     /* inputs / inactive    */
      --line: #dccfba;      /* warm borders         */
      --text: #453a3c;      /* plum ink             */
      --muted: #77685d;     /* taupe                */
      --accent: #0f7173;    /* teal                 */
      --accent-hi: #148a8c; /* teal hover           */
      --on-accent: #f4ebd9; /* cream text on teal   */
      --err: #c65c42;       /* terracotta           */
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    /* width + gutter on the scroll root so the vertical scrollbar never clips controls */
    html { width: 420px; overflow-x: hidden; scrollbar-gutter: stable; }
    body {
      background: var(--bg); color: var(--text);
      font: 13px/1.45 -apple-system, "Segoe UI", system-ui, sans-serif; padding: 15px 14px 14px;
    }
    header { display: flex; align-items: center; gap: 9px; margin-bottom: 3px; }
    header img { width: 26px; height: 26px; border-radius: 7px; }
    h1 { font-size: 15px; font-weight: 650; letter-spacing: -0.01em; }
    .sub { color: var(--muted); font-size: 11px; margin: 2px 0 13px 35px; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
           background: var(--muted); margin-right: 6px; vertical-align: middle; }
    .dot.ok { background: var(--accent); box-shadow: 0 0 0 3px rgba(15,113,115,.20); }
    .dot.err { background: var(--err); box-shadow: 0 0 0 3px rgba(198,92,66,.20); }
    fieldset { border: 1px solid var(--line); border-radius: var(--radius);
               padding: 11px 13px; margin-bottom: 11px; background: var(--panel); }
    legend { color: var(--muted); font-size: 10px; padding: 0 6px; text-transform: uppercase;
             letter-spacing: .09em; font-weight: 600; }
    .row { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; }
    select { background: var(--input); color: var(--text); border: 1px solid var(--line);
             border-radius: 8px; padding: 5px 9px; font-size: 12px; accent-color: var(--accent); }
    input[type=checkbox] { width: 17px; height: 17px; accent-color: var(--accent); cursor: pointer; }
    .seg { display: flex; gap: 7px; }
    .seg button { flex: 1; background: var(--input); color: var(--muted); border: 1px solid var(--line);
                  border-radius: 8px; padding: 7px; font-size: 12px; font-weight: 550; cursor: pointer;
                  transition: background .15s, color .15s, border-color .15s; }
    .seg button:hover { color: var(--text); }
    .seg button.active { background: var(--accent); color: var(--on-accent); border-color: var(--accent); }
    .chips { display: flex; gap: 7px; }
    .chips label { flex: 1; text-align: center; background: var(--input); border: 1px solid var(--line);
                   border-radius: 8px; padding: 6px 0; cursor: pointer; color: var(--muted);
                   font-size: 12px; font-weight: 550; transition: background .15s, color .15s, border-color .15s; }
    .chips input { display: none; }
    .chips label:has(input:checked) { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
    #scrape { width: 100%; background: var(--accent); color: var(--on-accent); border: none; border-radius: 10px;
              padding: 12px; font-size: 14px; font-weight: 650; cursor: pointer; margin-top: 3px;
              transition: background .15s, transform .05s; }
    #scrape:hover { background: var(--accent-hi); }
    #scrape:active { transform: translateY(1px); }
    #scrape:disabled { opacity: .5; cursor: not-allowed; }
    #status { margin-top: 11px; font-size: 12px; color: var(--muted); min-height: 16px; }
    #bar { height: 5px; background: var(--input); border-radius: 3px; overflow: hidden; margin-top: 9px; display: none; }
    #bar > i { display: block; height: 100%; width: 0; background: var(--accent); transition: width .3s; }
    #log { margin-top: 8px; max-height: 120px; overflow-y: auto; font-family: ui-monospace, "Cascadia Code", monospace;
           font-size: 11px; color: var(--muted); white-space: pre-wrap; }
    #queue { margin-top: 9px; display: none; }
    #queue .qh { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase;
                 letter-spacing: .07em; margin-bottom: 4px; }
    #queue .qrow { display: flex; align-items: center; gap: 7px; font-size: 12px; padding: 3px 4px;
                   color: var(--text); }
    #queue .qbadge { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
                     padding: 2px 6px; border-radius: 6px; background: var(--input); color: var(--muted); flex: none; }
    #queue .qbadge.run { background: var(--accent); color: var(--on-accent); }
    #queue .qbadge.err { background: var(--err); color: var(--on-accent); }
    #queue .qname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    /* lesson picker */
    .lhead { display: flex; align-items: center; justify-content: space-between; margin: 1px 0 8px; }
    #lcount { color: var(--muted); font-size: 11px; }
    .lbtns button { background: none; border: none; color: var(--accent); font-size: 12px;
                    font-weight: 650; cursor: pointer; padding: 2px 3px; }
    .lessons { max-height: 230px; overflow-y: auto; overflow-x: hidden; border: 1px solid var(--line);
               border-radius: 8px; background: var(--bg); padding: 4px 5px; }
    .sechead { display: flex; align-items: center; gap: 8px; margin: 6px 4px 2px; font-size: 10px;
               font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .lsec:first-child .sechead { margin-top: 2px; }
    .lrow { display: flex; align-items: flex-start; gap: 8px; padding: 3px 6px 3px 16px; font-size: 12px; color: var(--text); }
    .lrow span { line-height: 1.35; }
    .lrow input { margin-top: 2px; }
    .lrow input, .sechead input { accent-color: var(--accent); flex: none; cursor: pointer; }
  </style>
</head>
<body>
  <header>
    <img src="icons/icon48.png" alt="">
    <h1>Skool Classroom Intake</h1>
  </header>
  <div class="sub"><span id="srvdot" class="dot"></span><span id="srvtxt">checking server…</span></div>

  <fieldset>
    <legend>Run mode</legend>
    <div class="seg" id="mode">
      <button data-val="full" class="active">Full intake</button>
      <button data-val="download">Download only</button>
    </div>
  </fieldset>

  <fieldset>
    <legend>Options</legend>
    <div class="row">
      <label>Video quality</label>
      <select id="quality">
        <option value="480">480p</option>
        <option value="720" selected>720p</option>
        <option value="1080">1080p</option>
      </select>
    </div>
    <div class="row">
      <label>Whisper model</label>
      <select id="model">
        <option value="base.en">base.en (fastest)</option>
        <option value="small.en" selected>small.en</option>
        <option value="medium.en">medium.en (best)</option>
      </select>
    </div>
    <div class="row">
      <label>Screenshots</label>
      <input type="checkbox" id="screenshots" checked>
    </div>
  </fieldset>

  <fieldset id="fmtset">
    <legend>Transcript formats</legend>
    <div class="chips">
      <label><input type="checkbox" value="txt" checked><span>txt</span></label>
      <label><input type="checkbox" value="srt" checked><span>srt</span></label>
      <label><input type="checkbox" value="json" checked><span>json</span></label>
    </div>
  </fieldset>

  <fieldset id="lessonset" style="display:none">
    <legend>Lessons</legend>
    <div class="lhead">
      <span id="lcount">loading…</span>
      <span class="lbtns"><button type="button" id="lall">All</button><button type="button" id="lnone">None</button></span>
    </div>
    <div id="lessons" class="lessons"></div>
  </fieldset>

  <button id="scrape" disabled>Scrape this classroom</button>
  <div id="bar"><i></i></div>
  <div id="status"></div>
  <div id="queue"></div>
  <div id="log"></div>

  <script src="popup.js"></script>
</body>
</html>
